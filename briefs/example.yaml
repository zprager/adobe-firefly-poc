# Example campaign brief.
# Any field can be overridden on the CLI with --products, --region, --audience, --key-message, --cta, --logo, etc.

campaign: spring-launch

# Company / brand running the campaign.
company: Acme

# At least two products. Each entry is { name, description?, features? }; a bare
# string is also accepted and treated as { name }.
#
# `features` is an optional list of distinctive product traits. They are pushed
# into the hero-image prompt as concrete visual cues so products in the same
# family (e.g. Calendar vs. Notes) don't render as interchangeable scenes.
# Prefer phrasing that suggests *objects, props, or scene moments* over UI
# screenshots — gpt-image-1 leans into physical detail much better than chrome.
products:
  - name: Acme Calendar AI
    description: AI-powered scheduling that learns your habits and drafts your week.
    features:
      - a week-at-a-glance grid of time blocks, color-coded by focus vs. meetings
      - a wall clock or wristwatch as a hero prop — time is the subject
      - morning daylight suggesting the start of a planned day
      - a paper weekly planner open on the desk, pen resting on Monday
  - name: Acme Inbox AI
    description: Auto-triages email and surfaces only the threads that need you.
    features:
      - a single envelope or letter spotlit on an otherwise empty desk (signal vs. noise)
      - a tidy stack of sorted mail beside an empty in-tray
      - a magnifying glass or sorting motion implying triage
      - cool, focused task lighting rather than warm ambient light
  - name: Acme Notes AI
    description: Captures meeting notes and turns them into shareable summaries and action items.
    features:
      - an open notebook with handwritten bullet points and a few highlighted action items
      - sticky notes fanned across the desk, one circled as a key takeaway
      - a felt-tip pen mid-stroke, as if a thought is being captured
      - a small audio recorder or microphone beside the notebook (capture-from-meeting cue)

# Target region / market the campaign is aimed at.
region: North America (US + Canada)

# Target audience.
audience: Solo founders and small teams drowning in calendar and inbox work.

# Campaign message — the single idea every asset should reinforce.
key_message: Stop dragging your week around. Acme drafts it for you.

tone: confident, warm, slightly playful
cta: Try free for 14 days

brand:
  primary: "#0F172A"
  accent: "#F59E0B"
  text_on_primary: "#FFFFFF"
  font_heading: "Inter, system-ui, sans-serif"
  font_body: "Inter, system-ui, sans-serif"
  logo_path: ./assets/company/logo.png   # optional; PNG with transparent bg works best
  # label: NEW                    # optional pill text shown top-right; uncomment to show

  # Brand voice guardrails. Both lists are optional and additive; leave either
  # empty to skip. Injected into the copy prompt as HARD constraints — every
  # generated overlay/caption/hashtag set must respect them.
  guidelines:
    follow:
      - professional
      - no-nonsense
      - apolitical
      - inclusive language
    avoid:
      - controversy
      - sexism
      - racism
      - pessimism
      - hype words ("revolutionary", "game-changing", "synergy")
      - hard sell pressure tactics

hero:
  # Optional: supply your own hero image(s) to skip gpt-image-1 generation.
  # Resolution is per (product, ratio) with the following precedence:
  #
  #   1. Per-product per-ratio file:
  #        assets/{product-slug}/hero-1x1.png
  #        assets/{product-slug}/hero-16x9.png
  #        assets/{product-slug}/hero-9x16.png
  #      Folder name must match slug(product.name) — e.g. "Acme Calendar AI"
  #      becomes "acme-calendar-ai".
  #
  #   2. Campaign-wide per-ratio file:
  #        assets/company/hero-1x1.png
  #        assets/company/hero-16x9.png
  #        assets/company/hero-9x16.png
  #
  #   3. Single fallback image used for any ratio still missing a file:
  # image: ./assets/company/hero.png
  #
  #   4. Otherwise: generated by gpt-image-1 using the style/negative below.
  style: >
    Editorial photography, warm morning light, minimalist desk with
    a notebook and a coffee cup, soft depth of field, muted earth tones
  negative: no people, no faces, no text, no logos
